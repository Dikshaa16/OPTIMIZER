<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimization Techniques Visual Lab</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',300:'#7dd3fc',400:'#38bdf8',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',800:'#075985',900:'#0c4a6e' },
                        neon: { cyan:'#00f5ff', purple:'#bf00ff', pink:'#ff006e', green:'#00ff88' },
                        glass: { light:'rgba(255,255,255,0.08)', medium:'rgba(255,255,255,0.12)', heavy:'rgba(255,255,255,0.18)' },
                    }
                }
            }
        }
    </script>

    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

    <!-- html2canvas for screenshot -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark bg-gray-950 text-white overflow-x-hidden">

    <!-- ═══ LOADING SCREEN ═══ -->
    <div id="loading-screen" class="fixed inset-0 z-[9999] flex items-center justify-center bg-gray-950">
        <div class="text-center">
            <div class="loader-ring mb-6">
                <div></div><div></div><div></div><div></div>
            </div>
            <h2 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
                Optimization Visual Lab
            </h2>
            <p class="text-gray-400 mt-2 text-sm loading-text">Initializing algorithms...</p>
        </div>
    </div>

    <!-- ═══ ANIMATED BACKGROUND ═══ -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <canvas id="particle-canvas" class="fixed inset-0 w-full h-full"></canvas>
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-bg"></div>
    </div>

    <!-- ═══ SIDEBAR ═══ -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-72 glass-panel z-50 flex flex-col border-r border-white/5 transition-transform duration-300">
        <!-- Logo -->
        <div class="p-6 border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-purple-600 flex items-center justify-center">
                    <i data-lucide="zap" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">OptimLab</h1>
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest">Visual Explorer</p>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto scrollbar-thin">
            <button class="nav-item active" data-page="home">
                <i data-lucide="home" class="w-4 h-4"></i>
                <span>Home</span>
            </button>
            <button class="nav-item" data-page="concepts">
                <i data-lucide="book-open" class="w-4 h-4"></i>
                <span>Concept Explorer</span>
            </button>
            <button class="nav-item" data-page="algorithms">
                <i data-lucide="play-circle" class="w-4 h-4"></i>
                <span>Algorithm Visualizer</span>
            </button>
            <button class="nav-item" data-page="playground">
                <i data-lucide="box" class="w-4 h-4"></i>
                <span>3D Graph Playground</span>
            </button>
            <button class="nav-item" data-page="comparison">
                <i data-lucide="git-compare" class="w-4 h-4"></i>
                <span>Comparison Lab</span>
            </button>

            <div class="pt-4 mt-4 border-t border-white/5">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-3 px-3">Quick Links</p>
                <button class="nav-item" data-page="algorithms" data-sub="gradient-descent">
                    <i data-lucide="trending-down" class="w-4 h-4"></i>
                    <span>Gradient Descent</span>
                </button>
                <button class="nav-item" data-page="playground" data-sub="rosenbrock">
                    <i data-lucide="mountain" class="w-4 h-4"></i>
                    <span>Rosenbrock Surface</span>
                </button>
            </div>
        </nav>

        <!-- Theme Toggle -->
        <div class="p-4 border-t border-white/5">
            <button id="theme-toggle" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                <i data-lucide="moon" class="w-4 h-4" id="theme-icon"></i>
                <span id="theme-label">Dark Mode</span>
            </button>
        </div>
    </aside>

    <!-- ═══ MOBILE HAMBURGER ═══ -->
    <button id="mobile-menu" class="fixed top-4 left-4 z-[60] lg:hidden glass-panel p-2 rounded-xl">
        <i data-lucide="menu" class="w-5 h-5"></i>
    </button>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main id="main-content" class="ml-72 min-h-screen relative z-10 transition-all duration-300">
        <!-- Header -->
        <header class="sticky top-0 z-40 glass-panel border-b border-white/5 px-8 py-4">
            <div class="flex items-center justify-between">
                <div>
                    <h2 id="page-title" class="text-xl font-bold">Dashboard</h2>
                    <p id="page-subtitle" class="text-xs text-gray-400">Interactive optimization exploration</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white/5 border border-white/10 text-xs text-gray-400">
                        <i data-lucide="cpu" class="w-3 h-3"></i>
                        <span>Backend:</span>
                        <span id="api-status" class="text-red-400">●</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page Container -->
        <div id="page-container" class="p-6 lg:p-8">
            <!-- Pages are rendered here by JS -->
        </div>
    </main>

    <!-- ═══ TOAST CONTAINER ═══ -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] space-y-2"></div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/recording.js"></script>
    <script src="js/autodemo.js"></script>
    <script src="js/pages/home.js"></script>
    <script src="js/pages/concepts.js"></script>
    <script src="js/pages/algorithms.js"></script>
    <script src="js/pages/playground.js"></script>
    <script src="js/pages/comparison.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
